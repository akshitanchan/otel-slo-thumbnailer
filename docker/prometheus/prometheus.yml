global:
  scrape_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]
  - job_name: thumbnailer_api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]
  - job_name: thumbnailer_worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:8081"]

rule_files:
  - /etc/prometheus/alerts.yml
