services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: thumbnailer
    ports:
      - "5432:5432"
    volumes:
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d thumbnailer"]
      interval: 2s
      timeout: 2s
      retries: 20

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    environment:
      DATA_SOURCE_NAME: "postgresql://postgres:postgres@postgres:5432/thumbnailer?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:1.55
    ports:
      - "16686:16686"   # ui
      - "4317:4317"     # otlp grpc ingest
      - "4318:4318"     # otlp http ingest
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.142.0
    command: ["--config=/etc/otel-collector.yaml"]
    volumes:
      - ./docker/otel/otel-collector.yaml:/etc/otel-collector.yaml:ro
      - ./docker/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro

    ports:
      - "4319:4317"   # expose collector grpc on host:4319 (optional)
      - "4320:4318"   # expose collector http on host:4320 (optional)
    depends_on:
      - jaeger

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.3.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_DEFAULT_THEME: light
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus

  migrate:
    build:
      context: .
      dockerfile: services/migrate/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/thumbnailer
      MIGRATIONS_DIR: /app/db/migrations
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    environment:
      PORT: "8080"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/thumbnailer
      STORAGE_DIR: /data
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_RESOURCE_ATTRIBUTES: service.name=thumbnailer-api
    volumes:
      - thumb_data:/data
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      postgres-exporter:
        condition: service_started
      migrate:
        condition: service_completed_successfully

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment:
      PORT: "8081"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/thumbnailer
      STORAGE_DIR: /data
      POLL_MS: "200"
      CLAIM_BACKOFF_MS: "500"
      OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: http://otel-collector:4318/v1/traces
      OTEL_RESOURCE_ATTRIBUTES: service.name=thumbnailer-worker
    volumes:
      - thumb_data:/data
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      otel-collector:
        condition: service_started
      api:
        condition: service_started
      postgres-exporter:
        condition: service_started
      migrate:
        condition: service_completed_successfully

volumes:
  grafana_data:
  thumb_data:
